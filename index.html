<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0b1220" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Checklist Audio Video</title>
  <style>
    :root {
      --bg1: #07111f;
      --bg2: #0f172a;
      --panel: rgba(15, 23, 42, 0.74);
      --panel-strong: rgba(15, 23, 42, 0.94);
      --line: rgba(148, 163, 184, 0.16);
      --text: #e6eefc;
      --muted: #92a1b6;
      --blue: #60a5fa;
      --green: #22c55e;
      --green-2: #4ade80;
      --green-dark: #052e16;
      --shadow: 0 26px 80px rgba(0, 0, 0, 0.42);
      --radius-xl: 30px;
      --radius-lg: 22px;
      --radius-md: 18px;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(96, 165, 250, 0.20), transparent 34%),
        radial-gradient(circle at top right, rgba(34, 197, 94, 0.14), transparent 30%),
        linear-gradient(180deg, var(--bg1), var(--bg2));
      min-height: 100vh;
      padding: 14px;
      padding-top: calc(14px + env(safe-area-inset-top));
      padding-bottom: calc(14px + env(safe-area-inset-bottom));
      overflow-x: hidden;
    }
    .app {
      max-width: 820px;
      margin: 0 auto;
      background: linear-gradient(180deg, rgba(15, 23, 42, 0.86), rgba(15, 23, 42, 0.96));
      border: 1px solid rgba(148, 163, 184, 0.16);
      border-radius: 34px;
      overflow: hidden;
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
      min-height: calc(100vh - 28px);
      display: flex;
      flex-direction: column;
      position: relative;
    }
    header {
      padding: 18px 18px 16px;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(90deg, rgba(30, 41, 59, 0.95), rgba(15, 23, 42, 0.82));
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .logo {
      width: 52px;
      height: 52px;
      border-radius: 18px;
      background: linear-gradient(145deg, #22c55e, #60a5fa);
      display: grid;
      place-items: center;
      box-shadow: 0 14px 30px rgba(34, 197, 94, 0.18);
      flex: 0 0 auto;
    }
    .logo svg { width: 28px; height: 28px; }
    .title-wrap h1 {
      margin: 0;
      font-size: clamp(1.34rem, 4vw, 2rem);
      line-height: 1.05;
      letter-spacing: -0.03em;
    }
    .title-wrap .sub {
      margin-top: 7px;
      color: var(--muted);
      font-size: 0.98rem;
      line-height: 1.4;
    }
    main {
      padding: 18px;
      flex: 1;
      position: relative;
    }
    .screen { display: none; animation: fadeUp .28s ease; }
    .screen.active { display: block; }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .hero {
      margin: 2px 0 18px;
      border-radius: 28px;
      overflow: hidden;
      border: 1px solid rgba(148, 163, 184, 0.14);
      background: rgba(15, 23, 42, 0.7);
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.22);
      position: relative;
    }
    .hero::after {
      content: "";
      position: absolute;
      inset: auto 0 0 0;
      height: 34%;
      background: linear-gradient(180deg, transparent, rgba(15, 23, 42, 0.38));
      pointer-events: none;
    }
    .hero img {
      width: 100%;
      display: block;
      aspect-ratio: 1 / 1;
      object-fit: cover;
    }
    .section-label {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(96, 165, 250, 0.10);
      border: 1px solid rgba(96, 165, 250, 0.18);
      color: #bfdbfe;
      font-size: 0.76rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      font-weight: 800;
    }
    .screen h2 {
      margin: 12px 0 0;
      font-size: clamp(1.45rem, 4.2vw, 2rem);
      line-height: 1.1;
      letter-spacing: -0.03em;
    }
    .choices {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
      margin-top: 18px;
    }
    .choice-card {
      width: 100%;
      text-align: left;
      color: var(--text);
      border: 1px solid rgba(148, 163, 184, 0.18);
      background:
        linear-gradient(180deg, rgba(30, 41, 59, 0.95), rgba(15, 23, 42, 0.94));
      border-radius: var(--radius-xl);
      padding: 18px;
      cursor: pointer;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.15);
      transition: transform 0.18s ease, border-color 0.25s ease, background 0.25s ease, box-shadow 0.25s ease;
      position: relative;
      overflow: hidden;
      -webkit-tap-highlight-color: transparent;
    }
    .choice-card::before {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at top right, rgba(96, 165, 250, 0.16), transparent 45%);
      pointer-events: none;
    }
    .choice-card:hover {
      transform: translateY(-1px);
      border-color: rgba(96, 165, 250, 0.34);
      box-shadow: 0 16px 34px rgba(0, 0, 0, 0.20);
    }
    .choice-card:active { transform: translateY(1px) scale(0.995); }
    .choice-top {
      display: flex;
      align-items: center;
      gap: 12px;
      position: relative;
      z-index: 1;
    }
    .choice-icon {
      width: 46px;
      height: 46px;
      border-radius: 16px;
      display: grid;
      place-items: center;
      background: rgba(96, 165, 250, 0.15);
      border: 1px solid rgba(96, 165, 250, 0.22);
      color: #dbeafe;
      flex: 0 0 auto;
    }
    .choice-icon svg { width: 22px; height: 22px; }
    .choice-title {
      font-size: 1.08rem;
      font-weight: 850;
      letter-spacing: -0.02em;
    }
    .choice-desc {
      margin-top: 8px;
      color: var(--muted);
      line-height: 1.45;
      position: relative;
      z-index: 1;
    }
    .top-row {
      display: flex;
      justify-content: space-between;
      align-items: end;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }
    .type-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(34, 197, 94, 0.12);
      border: 1px solid rgba(34, 197, 94, 0.18);
      color: #bbf7d0;
      font-size: 0.76rem;
      font-weight: 900;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }
    .count {
      color: var(--muted);
      font-size: 0.94rem;
    }
    .progress-shell {
      height: 12px;
      border-radius: 999px;
      background: rgba(15, 23, 42, 0.95);
      border: 1px solid rgba(148, 163, 184, 0.18);
      overflow: hidden;
      margin: 16px 0 18px;
    }
    .progress-bar {
      height: 100%;
      width: 0%;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--green), var(--green-2));
      box-shadow: 0 0 22px rgba(34, 197, 94, 0.34);
      transition: width 0.30s ease;
    }
    .current-card {
      border: 1px solid rgba(148, 163, 184, 0.18);
      background:
        radial-gradient(circle at top right, rgba(34, 197, 94, 0.12), transparent 42%),
        linear-gradient(180deg, rgba(30, 41, 59, 0.96), rgba(15, 23, 42, 0.95));
      border-radius: var(--radius-xl);
      padding: 18px;
      min-height: 210px;
      display: grid;
      gap: 16px;
      align-content: space-between;
      box-shadow: 0 16px 34px rgba(0,0,0,.18);
      transform: translateZ(0);
      transition: transform 0.25s ease, opacity 0.25s ease;
    }
    .question-row {
      display: flex;
      gap: 12px;
      align-items: flex-start;
    }
    .question-dot {
      width: 22px;
      height: 22px;
      margin-top: 5px;
      border-radius: 999px;
      border: 2px solid rgba(148, 163, 184, 0.72);
      box-shadow: inset 0 0 0 3px rgba(15, 23, 42, 0.65);
      flex: 0 0 auto;
    }
    .meta {
      color: var(--muted);
      font-size: 0.92rem;
      margin-bottom: 6px;
    }
    .question-text {
      font-size: clamp(1.25rem, 4.7vw, 1.95rem);
      font-weight: 850;
      line-height: 1.16;
      letter-spacing: -0.03em;
    }
    .controls {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    .btn {
      border: 0;
      cursor: pointer;
      font: inherit;
      border-radius: 18px;
      padding: 16px 20px;
      font-weight: 850;
      transition:
        transform 0.10s ease,
        opacity 0.20s ease,
        box-shadow 0.25s ease,
        background 0.25s ease,
        color 0.25s ease;
      -webkit-tap-highlight-color: transparent;
    }
    .btn:active { transform: translateY(1px) scale(0.99); }
    .ok-btn {
      color: #dbeafe;
      background: linear-gradient(180deg, #334155, #1e293b);
      border: 1px solid rgba(148, 163, 184, 0.22);
      box-shadow: 0 14px 30px rgba(2, 6, 23, 0.22);
      min-width: 124px;
    }
    .ok-btn.clicked {
      color: var(--green-dark);
      background: linear-gradient(180deg, #4ade80, #22c55e);
      box-shadow: 0 14px 30px rgba(34, 197, 94, 0.24);
      border-color: rgba(34, 197, 94, 0.18);
    }
    .ok-btn:disabled {
      cursor: not-allowed;
      opacity: 0.55;
    }
    .hint {
      color: var(--muted);
      font-size: 0.94rem;
    }
    .list {
      display: grid;
      gap: 8px;
      margin-top: 16px;
    }
    .item {
      padding: 12px 14px;
      display: flex;
      align-items: center;
      gap: 10px;
      border: 1px solid rgba(148, 163, 184, 0.16);
      background: rgba(30, 41, 59, 0.72);
      border-radius: 18px;
      transition: background 0.2s ease, border-color 0.2s ease, transform 0.2s ease, opacity 0.2s ease;
      opacity: 0.98;
    }
    .item.done {
      border-color: rgba(34, 197, 94, 0.30);
      background: rgba(34, 197, 94, 0.08);
    }
    .item.current {
      border-color: rgba(96, 165, 250, 0.36);
      background: rgba(96, 165, 250, 0.08);
      transform: translateX(1px);
    }
    .check {
      width: 22px;
      height: 22px;
      border-radius: 999px;
      border: 2px solid rgba(148, 163, 184, 0.62);
      display: grid;
      place-items: center;
      font-size: 12px;
      color: transparent;
      flex: 0 0 auto;
    }
    .item.done .check {
      border-color: var(--green);
      background: var(--green);
      color: var(--green-dark);
      font-weight: 900;
    }
    .done-screen {
      padding: 26px 10px 8px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .done-badge {
      width: 92px;
      height: 92px;
      margin: 0 auto 14px;
      border-radius: 999px;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at 30% 30%, rgba(74, 222, 128, 0.22), rgba(34, 197, 94, 0.10));
      border: 1px solid rgba(34, 197, 94, 0.28);
      box-shadow: 0 18px 44px rgba(34, 197, 94, 0.14);
      font-size: 40px;
      position: relative;
      z-index: 2;
    }
    .big-title {
      margin: 0;
      font-size: clamp(2rem, 6vw, 3.6rem);
      line-height: 1;
      font-weight: 950;
      letter-spacing: -0.04em;
      position: relative;
      z-index: 2;
    }
    .end-note {
      margin-top: 10px;
      color: var(--muted);
      line-height: 1.45;
      position: relative;
      z-index: 2;
    }
    .restart-btn {
      margin-top: 16px;
      background: rgba(51, 65, 85, 0.92);
      color: var(--text);
      border: 1px solid rgba(148, 163, 184, 0.16);
      box-shadow: 0 12px 24px rgba(0,0,0,.14);
      position: relative;
      z-index: 2;
    }
    canvas#fireworks {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 1;
    }
    @media (min-width: 700px) {
      main { padding: 22px; }
      header { padding: 26px 24px 20px; }
      .choices { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .hero img { aspect-ratio: 16 / 10; }
    }
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        scroll-behavior: auto !important;
        animation-duration: 0.001ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.001ms !important;
      }
    }
  </style>
</head>

const okBtn = document.getElementById('okBtn');
const fireworks = document.getElementById('fireworks');
const fctx = fireworks.getContext('2d');

function show(screen) {
  [home, run, end].forEach(el => el.classList.remove('active'));
  screen.classList.add('active');
  if (screen === end) startFireworks();
  else stopFireworks();
}

function render() {
  const list = lists[currentType] || [];
  const total = list.length;
  const current = list[currentIndex];
  const progress = total ? Math.round((done.length / total) * 100) : 0;

  typeLabel.textContent = currentType === 'pubblica' ? 'ADUNANZA PUBBLICA' : 'ADUNANZA INFRASETTIMANALE';
  stepLabel.textContent = `Voce ${Math.min(currentIndex + 1, total)} di ${total}`;
  countLabel.textContent = `Completate: ${done.length}/${total}`;
  bar.style.width = progress + '%';
  question.textContent = current || '';
  okBtn.disabled = !current;
  okBtn.classList.remove('clicked');

  items.innerHTML = list.map((item, idx) => {
    const isDone = done.includes(item);
    const isCurrent = idx === currentIndex;
    return `
      <div class="item ${isDone ? 'done' : ''} ${isCurrent ? 'current' : ''}">
        <div class="check">${isDone ? '✓' : ''}</div>
        <div>${item}</div>
      </div>
    `;
  }).join('');
}

function start(type) {
  currentType = type;
  currentIndex = 0;
  done = [];
  show(run);
  render();
}

function next() {
  const list = lists[currentType] || [];
  const current = list[currentIndex];
  if (!current) return;

  okBtn.classList.add('clicked');
  if (navigator.vibrate) navigator.vibrate(30);

  setTimeout(() => {
    done.push(current);
    if (currentIndex < list.length - 1) {
      currentIndex++;
      render();
    } else {
      show(end);
      launchFireworksBurst();
    }
  }, 180);
}

function restart() {
  currentType = null;
  currentIndex = 0;
  done = [];
  stopFireworks();
  show(home);
  render();
}

function resizeFireworks() {
  const container = fireworks.parentElement;
  const dpr = Math.max(1, window.devicePixelRatio || 1);
  fireworks.width = Math.floor(container.clientWidth * dpr);
  fireworks.height = Math.floor(container.clientHeight * dpr);
  fireworks.style.width = '100%';
  fireworks.style.height = '100%';
  fctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}

function random(min, max) {
  return Math.random() * (max - min) + min;
}

function createParticle(x, y) {
  const hueOptions = [96, 125, 142, 196, 220, 38];
  const hue = hueOptions[Math.floor(Math.random() * hueOptions.length)];
  return {
    x, y,
    vx: random(-4.5, 4.5),
    vy: random(-8, -2),
    gravity: 0.14,
    life: random(70, 100),
    age: 0,
    size: random(2, 4),
    hue
  };
}

function launchFireworksBurst() {
  confetti = [];
  const w = fireworks.parentElement.clientWidth;
  const h = fireworks.parentElement.clientHeight;
  for (let i = 0; i < 10; i++) {
    const x = random(w * 0.15, w * 0.85);
    const y = random(h * 0.16, h * 0.40);
    const count = Math.floor(random(12, 20));
    for (let j = 0; j < count; j++) {
      confetti.push(createParticle(x, y));
    }
  }
  fireworks.style.display = 'block';
  resizeFireworks();
  animateFireworks();
  clearTimeout(fireworkTimer);
  fireworkTimer = setTimeout(() => {
    confetti = [];
    fctx.clearRect(0, 0, fireworks.width, fireworks.height);
  }, 3500);
}

function animateFireworks() {
  const w = fireworks.parentElement.clientWidth;
  const h = fireworks.parentElement.clientHeight;
  fctx.clearRect(0, 0, w, h);
  confetti = confetti.filter(p => p.age < p.life);
  for (const p of confetti) {
    p.age++;
    p.vy += p.gravity;
    p.x += p.vx;
    p.y += p.vy;
    const alpha = Math.max(0, 1 - p.age / p.life);
    fctx.beginPath();
    fctx.fillStyle = `hsla(${p.hue}, 95%, 65%, ${alpha})`;
    fctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    fctx.fill();
  }
  if (confetti.length) requestAnimationFrame(animateFireworks);
}

function startFireworks() {
  launchFireworksBurst();
}

function stopFireworks() {
  clearTimeout(fireworkTimer);
  fireworkTimer = null;
  confetti = [];
  if (fctx) {
    fctx.clearRect(0, 0, fireworks.width, fireworks.height);
  }
  fireworks.style.display = 'none';
}

window.addEventListener('resize', () => {
  if (end.classList.contains('active')) resizeFireworks();
});

render();
stopFireworks();
</script>
</body>
</html>
