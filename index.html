<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0f172a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <title>Checklist Audio Video</title>
  <style>
    :root{
      --bg:#0f172a; --panel:#1e293b; --panel2:#111827; --border:#334155;
      --text:#e2e8f0; --muted:#94a3b8; --ok:#22c55e; --okText:#052e16;
    }
    *{box-sizing:border-box}
    body{
      margin:0; font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      background:radial-gradient(circle at top,#1e293b 0%,var(--bg) 55%);
      color:var(--text); min-height:100vh; padding:16px;
    }
    .app{
      max-width:720px; margin:0 auto; background:rgba(15,23,42,.92);
      border:1px solid rgba(51,65,85,.95); border-radius:28px; overflow:hidden;
      box-shadow:0 20px 60px rgba(0,0,0,.35);
      min-height:calc(100vh - 32px);
    }
    header{padding:20px 20px 16px;border-bottom:1px solid var(--border);background:linear-gradient(90deg,rgba(30,41,59,.95),rgba(15,23,42,.95))}
    h1{margin:0;font-size:clamp(1.35rem,4vw,2rem);line-height:1.1}
    .sub{margin-top:8px;color:var(--muted);font-size:.98rem}
    main{padding:18px}
    .screen{display:none}.screen.active{display:block}
    .choices{display:grid;grid-template-columns:1fr;gap:12px;margin-top:16px}
    .card,.item{background:var(--panel);border:1px solid var(--border);border-radius:22px}
    .choice{
      width:100%; text-align:left; color:var(--text); padding:20px; border:0; cursor:pointer;
      font:inherit;
    }
    .choice b{display:block;font-size:1.05rem}
    .choice span{display:block;color:var(--muted);margin-top:8px;line-height:1.4}
    .top{display:flex;justify-content:space-between;align-items:end;gap:10px;flex-wrap:wrap}
    .badge{font-size:.76rem;letter-spacing:.12em;text-transform:uppercase;color:#cbd5e1}
    .progress{height:12px;background:#0b1220;border:1px solid rgba(51,65,85,.85);border-radius:999px;overflow:hidden;margin:16px 0 18px}
    .bar{height:100%;width:0%;background:linear-gradient(90deg,#22c55e,#4ade80);border-radius:999px;transition:width .25s ease}
    .current{padding:20px;display:grid;gap:16px;min-height:180px;align-content:space-between}
    .q{display:flex;gap:12px;align-items:flex-start}
    .dot{width:22px;height:22px;margin-top:4px;border-radius:999px;border:2px solid #64748b;flex:0 0 auto}
    .qt{font-size:clamp(1.2rem,4vw,1.8rem);font-weight:750;line-height:1.18}
    .controls{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap}
    .meta{color:var(--muted);font-size:.94rem}
    .btn{
      border:0; cursor:pointer; font:inherit; border-radius:18px; padding:16px 20px; font-weight:800;
      transition:transform .08s ease, opacity .2s ease;
    }
    .btn:active{transform:translateY(1px)}
    .ok{background:var(--ok);color:var(--okText)}
    .restart{background:#334155;color:var(--text);margin-top:14px}
    .ok:disabled{opacity:.4;cursor:not-allowed}
    .list{display:grid;gap:8px;margin-top:16px}
    .item{padding:12px 14px;display:flex;align-items:center;gap:10px}
    .item.done{border-color:rgba(34,197,94,.45);background:rgba(34,197,94,.08)}
    .item.current{border-color:rgba(34,197,94,.95);background:rgba(34,197,94,.12)}
    .check{width:20px;height:20px;border-radius:999px;border:2px solid #64748b;display:grid;place-items:center;font-size:12px;flex:0 0 auto}
    .item.done .check{border-color:var(--ok);background:var(--ok);color:var(--okText);font-weight:900}
    .done{padding:28px 10px 12px;text-align:center}
    .emoji{width:88px;height:88px;margin:0 auto 12px;border-radius:999px;display:grid;place-items:center;background:rgba(34,197,94,.12);border:1px solid rgba(34,197,94,.28);font-size:40px}
    .big{margin:0;font-size:clamp(2rem,6vw,3.4rem);font-weight:900}
    .footer{color:var(--muted);margin-top:10px}
  </style>
</head>
<body>
  <div class="app">
    <header>
      <h1>Checklist Audio/Video</h1>
      <div class="sub">Tocca OK per passare alla voce successiva.</div>
    </header>

    <main>
      <section id="home" class="screen active">
        <div class="badge">Selezione iniziale</div>
        <h2 style="margin:0;font-size:1.45rem;">Scegli il tipo di adunanza</h2>
        <div class="choices">
          <button class="card choice" onclick="start('infrasettimanale')">
            <b>Adunanza infrasettimanale</b>
            <span>Checklist completa per la sala e per Zoom.</span>
          </button>
          <button class="card choice" onclick="start('pubblica')">
            <b>Adunanza pubblica</b>
            <span>Checklist dedicata all’adunanza pubblica.</span>
          </button>
        </div>
      </section>

      <section id="run" class="screen">
        <div class="top">
          <div>
            <div id="typeLabel" class="badge"></div>
            <h2 id="stepLabel" style="margin:0;font-size:1.35rem;">Voce 1 di 1</h2>
          </div>
          <div id="countLabel" class="meta">Completate: 0/0</div>
        </div>

        <div class="progress"><div id="bar" class="bar"></div></div>

        <div class="card current">
          <div class="q">
            <div class="dot"></div>
            <div>
              <div class="meta">Controllo da fare ora</div>
              <div id="question" class="qt"></div>
            </div>
          </div>

          <div class="controls">
            <div class="meta">Quando hai terminato, premi OK.</div>
            <button id="okBtn" class="btn ok" onclick="next()">OK ✓</button>
          </div>
        </div>

        <div id="items" class="list"></div>
      </section>

      <section id="end" class="screen">
        <div class="done">
          <div class="emoji">✓</div>
          <h2 class="big">BUON ADUNANZA</h2>
          <div class="footer">Tutte le verifiche sono state completate.</div>
          <button class="btn restart" onclick="restart()">Ricomincia</button>
        </div>
      </section>
    </main>
  </div>

<script>
const lists = {
  infrasettimanale: [
    "acceso i pc?",
    "acceso mixer e amplificatore?",
    "acceso le tv?",
    "acceso i radiomicrofoni?",
    "acceso audio nella saletta?",
    "aperto zoom?",
    "messo co-host il portatile?",
    "hai silenziato tutti e messo il blocco per attivazione audio su zoom?",
    "aperto programma mixer?",
    "aperto jw library?",
    "preparato il timer?",
    "acceso monitor e la cassa sul podio?",
    "provato tutti i microfoni sul podio?",
    "il tavolino delle dimostrazioni è ben inquadrato su zoom?",
    "provato i radiomicrofoni?",
    "sia in sala che su zoom, il cantico o un video si vede e si sente bene?",
    "fatto prove con chi deve svolgere le dimostrazioni?",
    "abbigliamento idoneo? se hai dubbi avvisi il presidente",
    "avvisato i microfonisti? nel dubbio sull'abbigliamento avvvisa il CCA o un suo sostituto"
  ],
  pubblica: [
    "acceso i pc?",
    "acceso mixer e amplificatore?",
    "acceso le tv?",
    "acceso i radiomicrofoni?",
    "acceso audio nella saleta?",
    "aperto zoom?",
    "messo co-host il portatile?",
    "hai silenziato tutti e messo il blocco per attivazione audio su zoom?",
    "aperto programma mixer?",
    "aperto jw library?",
    "preparato il timer?",
    "acceso monitor e la cassa sul podio?",
    "provato tutti i microfoni sul podio?",
    "il tavolino delle dimostrazioni è ben inquadrato su zoom?",
    "provato i radiomicrofoni?",
    "avvisato i microfonisti? nel dubbio sull'abbigliamento avvvisa il CCA o un suo sostituto",
    "sia in sala che su zoom, il cantico o un video si vede e si sente bene?",
    "REGOLATO il microfono con l'oratore e il lettore della W?",
    "preparato il file con le immagini e parlato con l'oratore su come usarle?"
  ]
};

let currentType = null;
let currentIndex = 0;
let done = [];

const home = document.getElementById('home');
const run = document.getElementById('run');
const end = document.getElementById('end');
const typeLabel = document.getElementById('typeLabel');
const stepLabel = document.getElementById('stepLabel');
const countLabel = document.getElementById('countLabel');
const bar = document.getElementById('bar');
const question = document.getElementById('question');
const items = document.getElementById('items');
const okBtn = document.getElementById('okBtn');

function show(screen){
  [home,run,end].forEach(el=>el.classList.remove('active'));
  screen.classList.add('active');
}

function render(){
  const list = lists[currentType] || [];
  const total = list.length;
  const current = list[currentIndex];
  const progress = total ? Math.round((done.length / total) * 100) : 0;

  typeLabel.textContent = currentType === 'pubblica' ? 'ADUNANZA PUBBLICA' : 'ADUNANZA INFRASETTIMANALE';
  stepLabel.textContent = `Voce ${Math.min(currentIndex + 1, total)} di ${total}`;
  countLabel.textContent = `Completate: ${done.length}/${total}`;
  bar.style.width = progress + '%';
  question.textContent = current || '';
  okBtn.disabled = !current;

  items.innerHTML = list.map((item, idx) => {
    const isDone = done.includes(item);
    const isCurrent = idx === currentIndex;
    return `<div class="item ${isDone ? 'done' : ''} ${isCurrent ? 'current' : ''}">
      <div class="check">${isDone ? '✓' : ''}</div>
      <div>${item}</div>
    </div>`;
  }).join('');
}

function start(type){
  currentType = type;
  currentIndex = 0;
  done = [];
  show(run);
  render();
}

function next(){
  const list = lists[currentType] || [];
  const current = list[currentIndex];
  if(!current) return;
  done.push(current);
  if(currentIndex < list.length - 1){
    currentIndex++;
    render();
  } else {
    show(end);
  }
}

function restart(){
  currentType = null;
  currentIndex = 0;
  done = [];
  show(home);
  render();
}

render();

if('serviceWorker' in navigator){
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(()=>{});
  });
}
</script>
</body>
</html>
